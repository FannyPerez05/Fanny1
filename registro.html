<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biblioteca | Registro</title>

<link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
<link href="./wwwroot/css/style.css" rel="stylesheet">
<link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">

<script src="./wwwroot/js/jquery-4.0.0.min.js"></script>
<script src="./wwwroot/js/script.js"></script>

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0d6efd,#6610f2,#d63384);
    background-size:300% 300%;
    animation:fondo 8s ease infinite;
}

@keyframes fondo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.registro-box{
    background:rgba(255,255,255,.96);
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.20);
    position:relative;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    background:linear-gradient(135deg,#0d6efd,#d63384);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    margin:auto;
    margin-top:-75px;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.form-control:focus{
    border-color:#6610f2;
    box-shadow:0 0 0 .2rem rgba(102,16,242,.15);
}

.btn-registro{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    border:none;
    border-radius:12px;
    padding:10px 18px;
    font-weight:600;
}

.btn-registro:hover{
    color:white;
    transform:translateY(-2px);
}

.link{
    text-decoration:none;
    color:#6610f2;
    font-weight:600;
}

.link:hover{
    color:#d63384;
}
</style>

</head>

<body>

<main id="main">
<div class="container-lg d-flex flex-column">
<div class="row align-items-center justify-content-center min-vh-100">

<div class="col-md-7 col-lg-5">

<div class="shadow mt-5 p-5 bg-white rounded-3 border registro-box">

<div class="logo">
<i class="bi bi-person-plus-fill"></i>
</div>

<div class="w-100 text-center mt-3">
<h1 class="display-6 fw-bold">Regístrate</h1>
<p class="text-muted">Crea tu cuenta para acceder al sistema</p>
</div>

<div class="col-12">

<div class="mb-3">
<label for="nombre" class="form-label fw-semibold">
<i class="bi bi-person-fill"></i> Nombre completo
</label>
<input class="form-control" id="nombre" placeholder="Ingresa tu nombre">
</div>

<div class="mb-3">
<label for="email" class="form-label fw-semibold">
<i class="bi bi-envelope-fill"></i> Email
</label>
<input class="form-control" id="email" placeholder="usuario@correo.com">
</div>

<div class="mb-3">
<label for="pwd" class="form-label fw-semibold">
<i class="bi bi-lock-fill"></i> Contraseña
</label>
<input class="form-control" type="password" id="pwd" placeholder="********">
</div>

<div class="d-flex justify-content-between align-items-center py-3">

<div>
<span class="small text-muted">¿Ya tienes cuenta?</span>
<a class="small link" href="index.html"> Iniciar sesión</a>
</div>

<!-- IMPORTANTE: mantiene la función original -->
<button type="button" class="btn btn-registro" onclick="registroUsuarios();">
<i class="bi bi-person-check-fill"></i>
Registrarse
</button>

</div>

</div>
</div>

</div>
</div>
</div>
</main>

</body>
</html>
