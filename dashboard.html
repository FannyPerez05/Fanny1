<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biblioteca</title>

<link href="./wwwroot/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="./wwwroot/css/bootstrap-icons.min.css">
<script src="./wwwroot/js/jquery-4.0.0.min.js"></script>
<script src="./wwwroot/js/script.js"></script>

<style>
body{
    background:linear-gradient(135deg,#0d6efd,#6610f2,#d63384);
    background-size:300% 300%;
    animation:fondo 8s ease infinite;
    font-family:'Segoe UI',sans-serif;
}

@keyframes fondo{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card-box{
    background:white;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    padding:25px;
}

input{
    border-radius:12px !important;
    padding:10px !important;
}

.btn-libro{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    border:none;
    border-radius:12px;
}

.btn-libro:hover{
    transform:translateY(-2px);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header>
<div class="px-3 py-2 text-bg-primary border-bottom">
<div class="container">
<div class="d-flex flex-wrap align-items-center justify-content-between">

<span class="text-white fw-bold">
<i class="bi bi-book"></i> Biblioteca Digital
</span>

<a class="btn btn-light btn-sm" href="#">Salir</a>

</div>
</div>
</div>
</header>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<aside class="col-lg-2 d-none d-lg-block"
style="position: fixed; top:0; bottom:0; left:0; margin-top:70px; padding:15px; background:white;">

<ul class="nav flex-column">

<li class="nav-item mb-2">
<a class="nav-link active" href="#">
<i class="bi bi-book"></i> Libros
</a>
</li>

<li class="nav-item mb-2">
<a class="nav-link" href="#">
<i class="bi bi-person"></i> Usuarios
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">
<i class="bi bi-journal"></i> Préstamos
</a>
</li>

</ul>

</aside>

<!-- CONTENIDO -->
<main class="col-lg-10 offset-lg-2 p-4">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card-box text-center">

<h3 class="fw-bold">Agregar Libro</h3>
<p class="text-muted">Ingresa un nuevo libro</p>

<form>

<div class="mb-3 text-start">
<label><i class="bi bi-book"></i> Título</label>
<input class="form-control" placeholder="Nombre del libro">
</div>

<button class="btn btn-libro w-100">
<i class="bi bi-plus-circle"></i> Guardar
</button>

</form>

</div>

</div>

</div>

<!-- TABLA -->
<div class="row mt-5">
<div class="col-md-10 mx-auto">

<div class="card-box">

<h4 class="mb-3">Libros registrados</h4>

<table class="table table-striped">

<thead class="table-primary">
<tr>
<th>ID</th>
<th>Título</th>
<th>Autor</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>Ejemplo libro</td>
<td>Autor ejemplo</td>
<td>
<button class="btn btn-danger btn-sm">
<i class="bi bi-trash"></i>
</button>
</td>
</tr>

</tbody>

</table>

</div>

</div>
</div>

</main>

</div>
</div>

<script src="./wwwroot/js/bootstrap.bundle.min.js"></script>

</body>
</html>
